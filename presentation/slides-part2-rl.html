<h2 id="217-portfolio-optimal-control--control-problem">2.17. Portfolio optimal control — control problem</h2>
<h3 id="goal-1">Goal</h3>
<p>Learn an investment policy that chooses how much wealth to allocate to a risky asset over time, while balancing:</p>
<ul>
<li><strong>growth of wealth</strong></li>
<li><strong>risk / concentration penalty</strong></li>
